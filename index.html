<!doctype html>
<html lang="id" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suku Indonesia - Peta Interaktif</title>
    <link rel="icon" type="image/png" href="assets/img/Logo_UNIKA.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      /* ===== THEME VARIABLES ===== */
      :root {
        --yellow: #e8a800;
        --yellow-light: #fff3c4;
        --red: #d42b2f;
        --accent: #e8a800;

        /* Light mode defaults */
        --bg: #f8f6f1;
        --bg2: #ffffff;
        --bg3: #f0ede6;
        --surface: #ffffff;
        --surface2: #f4f1ec;
        --border: rgba(0, 0, 0, 0.1);
        --border-accent: rgba(232, 168, 0, 0.35);
        --text: #1a1410;
        --text-muted: #7a6f5e;
        --text-subtle: #b0a896;
        --shadow: rgba(0, 0, 0, 0.1);
        --shadow-strong: rgba(0, 0, 0, 0.18);
        --topbar-bg: rgba(248, 246, 241, 0.97);
        --sidebar-bg: rgba(255, 255, 255, 0.98);
        --detail-bg: rgba(255, 255, 255, 0.99);
        --marker-bg: #ffffff;
        --popup-bg: rgba(255, 255, 255, 0.98);
        --stat-bg: rgba(0, 0, 0, 0.04);
        --stat-border: rgba(0, 0, 0, 0.08);
        --sidebar-w: 300px;
        --detail-w: 380px;
      }

      [data-theme="dark"] {
        --yellow: #fff112;
        --yellow-light: rgba(255, 241, 18, 0.12);
        --red: #ec3237;
        --accent: #fff112;

        --bg: #0d0d0d;
        --bg2: #1a1a1a;
        --bg3: #252525;
        --surface: #141414;
        --surface2: #1e1e1e;
        --border: rgba(255, 255, 255, 0.07);
        --border-accent: rgba(255, 241, 18, 0.25);
        --text: #f5f5f0;
        --text-muted: #888;
        --text-subtle: #555;
        --shadow: rgba(0, 0, 0, 0.4);
        --shadow-strong: rgba(0, 0, 0, 0.6);
        --topbar-bg: rgba(13, 13, 13, 0.97);
        --sidebar-bg: rgba(18, 18, 18, 0.98);
        --detail-bg: rgba(16, 16, 16, 0.99);
        --marker-bg: #0d0d0d;
        --popup-bg: rgba(18, 18, 18, 0.98);
        --stat-bg: rgba(255, 255, 255, 0.04);
        --stat-border: rgba(255, 255, 255, 0.08);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Bricolage Grotesque", sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow: hidden;
        height: 100vh;
        transition:
          background 0.3s,
          color 0.3s;
      }

      /* ===== LOADING SCREEN ===== */
      #loading-screen {
        position: fixed;
        inset: 0;
        background: #fffdf8;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
      }

      .loader-unika-logo {
        width: 200px;
        height: 200px;
        object-fit: contain;
        animation: logo-appear 0.6s ease forwards;
        opacity: 0;
      }

      @keyframes logo-appear {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .loader-unika-fallback {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #e8a800, #d42b2f);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Bebas Neue", sans-serif;
        font-size: 28px;
        color: white;
        letter-spacing: 2px;
        animation: logo-appear 0.6s ease forwards;
        opacity: 0;
      }

      .loader-logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        animation: logo-appear 0.6s 0.2s ease forwards;
        opacity: 0;
      }

      .loader-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(40px, 7vw, 80px);
        color: #1a1410;
        letter-spacing: 5px;
        line-height: 1;
      }

      .loader-title span {
        color: #e8a800;
      }

      .loader-subtitle {
        font-size: 12px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #9a8e7e;
        font-family: "DM Mono", monospace;
      }

      .loader-bar-wrap {
        width: 240px;
        height: 3px;
        background: rgba(0, 0, 0, 0.08);
        border-radius: 99px;
        overflow: hidden;
      }

      .loader-bar {
        height: 100%;
        background: linear-gradient(90deg, #e8a800, #d42b2f);
        border-radius: 99px;
        animation: load-progress 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      @keyframes load-progress {
        0% {
          width: 0%;
        }
        60% {
          width: 75%;
        }
        90% {
          width: 92%;
        }
        100% {
          width: 100%;
        }
      }

      .loader-dots {
        display: flex;
        gap: 8px;
      }

      .loader-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #d42b2f;
        animation: dot-bounce 1.2s ease-in-out infinite;
      }

      .loader-dots span:nth-child(2) {
        animation-delay: 0.2s;
        background: #e8a800;
      }
      .loader-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes dot-bounce {
        0%,
        80%,
        100% {
          transform: scale(0.6);
          opacity: 0.4;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* ===== MAIN LAYOUT ===== */
      #app {
        display: flex;
        height: 100vh;
        opacity: 0;
        transition: opacity 0.6s ease;
      }

      #app.visible {
        opacity: 1;
      }

      /* ===== TOP BAR ===== */
      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        background: var(--topbar-bg);
        backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--border);
        z-index: 900;
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 12px;
        box-shadow: 0 1px 8px var(--shadow);
        transition:
          background 0.3s,
          border-color 0.3s;
      }

      .topbar-logo {
        font-family: "Bebas Neue", sans-serif;
        font-size: 20px;
        color: var(--yellow);
        letter-spacing: 3px;
      }

      .topbar-sep {
        width: 1px;
        height: 20px;
        background: var(--border);
      }

      .topbar-tag {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 1px;
      }

      .topbar-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .province-count-badge {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        background: var(--yellow-light);
        color: var(--yellow);
        border: 1px solid var(--border-accent);
        padding: 4px 10px;
        border-radius: 4px;
        letter-spacing: 1px;
      }

      /* ===== DARK MODE TOGGLE ===== */
      .theme-toggle {
        display: flex;
        align-items: center;
        gap: 7px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 4px 10px 4px 6px;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
      }

      .theme-toggle:hover {
        border-color: var(--border-accent);
        background: var(--yellow-light);
      }

      .toggle-track {
        width: 30px;
        height: 16px;
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 10px;
        position: relative;
        transition: background 0.25s;
      }

      [data-theme="dark"] .toggle-track {
        background: #2a2a2a;
        border-color: rgba(255, 241, 18, 0.3);
      }

      .toggle-thumb {
        position: absolute;
        top: 1px;
        left: 1px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--text-muted);
        transition:
          transform 0.25s cubic-bezier(0.4, 0, 0.2, 1),
          background 0.25s;
      }

      [data-theme="dark"] .toggle-thumb {
        transform: translateX(14px);
        background: #fff112;
      }

      .toggle-label {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--text-muted);
        letter-spacing: 0.5px;
      }

      .toggle-icon {
        font-size: 13px;
      }

      /* ===== MOBILE MENU BUTTON ===== */
      .mobile-menu-btn {
        display: none;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: all 0.2s;
        color: var(--text);
      }

      .mobile-menu-btn:hover {
        background: var(--yellow-light);
        border-color: var(--border-accent);
      }

      /* ===== LEFT SIDEBAR ===== */
      .sidebar-left {
        position: fixed;
        top: 52px;
        left: 0;
        bottom: 0;
        width: var(--sidebar-w);
        background: var(--sidebar-bg);
        backdrop-filter: blur(10px);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        z-index: 800;
        transition:
          background 0.3s,
          border-color 0.3s,
          transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 2px 0 12px var(--shadow);
      }

      .sidebar-head {
        padding: 16px 14px 12px;
        border-bottom: 1px solid var(--border);
      }

      .sidebar-head h2 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 18px;
        letter-spacing: 3px;
        color: var(--yellow);
        margin-bottom: 10px;
      }

      .search-wrap {
        position: relative;
      }

      .search-input {
        width: 100%;
        background: var(--surface2);
        border: 1.5px solid var(--border);
        color: var(--text);
        font-family: "Bricolage Grotesque", sans-serif;
        font-size: 13px;
        padding: 9px 14px 9px 36px;
        border-radius: 8px;
        outline: none;
        transition:
          border-color 0.2s,
          background 0.2s;
      }

      .search-input:focus {
        border-color: var(--border-accent);
        background: var(--yellow-light);
      }

      .search-input::placeholder {
        color: var(--text-subtle);
      }

      .search-icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 14px;
        pointer-events: none;
      }

      .province-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px 6px;
      }

      .province-list::-webkit-scrollbar {
        width: 3px;
      }
      .province-list::-webkit-scrollbar-track {
        background: transparent;
      }
      .province-list::-webkit-scrollbar-thumb {
        background: var(--border-accent);
        border-radius: 3px;
      }

      .province-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
        margin-bottom: 2px;
        border: 1px solid transparent;
      }

      .province-item:hover {
        background: var(--yellow-light);
        border-color: var(--border-accent);
      }

      .province-item.active {
        background: var(--yellow-light);
        border-color: var(--border-accent);
      }

      .province-item.active .p-name {
        color: var(--yellow);
      }

      .p-num {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--text-subtle);
        min-width: 22px;
      }

      .p-name {
        font-size: 13px;
        font-weight: 600;
        flex: 1;
        color: var(--text);
      }

      .p-island {
        font-size: 10px;
        color: var(--text-muted);
        padding: 2px 6px;
        background: var(--surface2);
        border-radius: 4px;
        border: 1px solid var(--border);
      }

      .p-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--red);
        opacity: 0.4;
        transition:
          opacity 0.2s,
          background 0.2s;
      }

      .province-item.active .p-dot,
      .province-item:hover .p-dot {
        opacity: 1;
        background: var(--yellow);
      }

      .sidebar-footer-info {
        padding: 10px 14px;
        border-top: 1px solid var(--border);
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--text-muted);
        display: flex;
        justify-content: space-between;
      }

      /* ===== MAP ===== */
      #map {
        position: fixed;
        top: 52px;
        left: var(--sidebar-w);
        right: 0;
        bottom: 0;
        z-index: 100;
        transition:
          right 0.35s cubic-bezier(0.4, 0, 0.2, 1),
          left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }

      #map.detail-open {
        right: var(--detail-w);
      }

      /* Leaflet popup theming */
      .leaflet-popup-content-wrapper {
        background: var(--popup-bg) !important;
        backdrop-filter: blur(12px) !important;
        border: 1px solid var(--border-accent) !important;
        border-radius: 12px !important;
        color: var(--text) !important;
        box-shadow: 0 8px 32px var(--shadow-strong) !important;
      }

      .leaflet-popup-tip {
        background: var(--popup-bg) !important;
      }

      .leaflet-popup-close-button {
        color: var(--text-muted) !important;
        font-size: 18px !important;
        top: 6px !important;
        right: 8px !important;
      }

      .popup-inner {
        padding: 4px 2px;
      }
      .popup-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 18px;
        color: var(--yellow);
        letter-spacing: 2px;
        margin-bottom: 4px;
      }
      .popup-sub {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 4px;
      }
      .popup-pop {
        font-size: 12px;
        color: var(--text);
        margin-bottom: 10px;
      }
      .popup-btn {
        background: linear-gradient(135deg, var(--yellow), #c8900a);
        color: white;
        border: none;
        padding: 7px 16px;
        border-radius: 6px;
        font-family: "Bricolage Grotesque", sans-serif;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        width: 100%;
        letter-spacing: 0.5px;
        transition:
          transform 0.1s,
          box-shadow 0.1s;
      }

      [data-theme="dark"] .popup-btn {
        color: #0d0d0d;
      }

      .popup-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(232, 168, 0, 0.4);
      }

      /* ===== RIGHT DETAIL PANEL ===== */
      .detail-panel {
        position: fixed;
        top: 52px;
        right: 0;
        bottom: 0;
        width: var(--detail-w);
        background: var(--detail-bg);
        backdrop-filter: blur(12px);
        border-left: 1px solid var(--border);
        z-index: 800;
        display: flex;
        flex-direction: column;
        transform: translateX(100%);
        transition:
          transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
          background 0.3s,
          border-color 0.3s;
        box-shadow: -4px 0 20px var(--shadow);
      }

      .detail-panel.open {
        transform: translateX(0);
      }

      .detail-header {
        padding: 18px 16px 14px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(
          180deg,
          var(--yellow-light) 0%,
          transparent 100%
        );
        position: relative;
      }

      .detail-close {
        position: absolute;
        top: 14px;
        right: 14px;
        width: 28px;
        height: 28px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        transition: all 0.15s;
      }

      .detail-close:hover {
        background: rgba(212, 43, 47, 0.12);
        border-color: rgba(212, 43, 47, 0.3);
        color: var(--red);
      }

      .detail-island-tag {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--red);
        margin-bottom: 6px;
      }

      .detail-prov-name {
        font-family: "Bebas Neue", sans-serif;
        font-size: 28px;
        color: var(--yellow);
        letter-spacing: 3px;
        line-height: 1;
        margin-bottom: 4px;
      }

      .detail-capital {
        font-size: 12px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .detail-stats {
        display: flex;
        gap: 8px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
      }

      .stat-box {
        flex: 1;
        background: var(--stat-bg);
        border: 1px solid var(--stat-border);
        border-radius: 8px;
        padding: 9px 8px;
        text-align: center;
      }

      .stat-val {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        color: var(--yellow);
        font-weight: 500;
        margin-bottom: 3px;
      }

      .stat-lbl {
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 0.5px;
      }

      /* Image box */
      .detail-img-box {
        margin: 12px 14px 0;
        height: 150px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        background: var(--surface);
      }

      .detail-img-box img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .detail-img-placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        color: var(--text-muted);
      }

      .detail-img-placeholder .icon {
        font-size: 32px;
        opacity: 0.4;
      }

      .detail-img-placeholder p {
        font-size: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
        opacity: 0.4;
      }

      .img-label {
        position: absolute;
        bottom: 8px;
        left: 8px;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
        border-radius: 4px;
        padding: 3px 8px;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.7);
        letter-spacing: 0.5px;
      }

      /* Suku description */
      .detail-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 12px 14px 8px;
      }

      .detail-scroll::-webkit-scrollbar {
        width: 3px;
      }
      .detail-scroll::-webkit-scrollbar-thumb {
        background: var(--border-accent);
        border-radius: 3px;
      }

      .suku-section-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 13px;
        letter-spacing: 3px;
        color: var(--red);
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .suku-section-title::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(212, 43, 47, 0.2);
      }

      .suku-desc-box {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-left: 3px solid var(--red);
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 12.5px;
        line-height: 1.75;
        color: var(--text-muted);
      }

      .suku-name-tag {
        display: inline-block;
        font-family: "DM Mono", monospace;
        font-size: 10px;
        background: rgba(212, 43, 47, 0.08);
        color: var(--red);
        border: 1px solid rgba(212, 43, 47, 0.2);
        padding: 2px 8px;
        border-radius: 4px;
        letter-spacing: 1px;
        margin-bottom: 8px;
      }

      .detail-btn-full {
        margin: 12px 14px 14px;
        background: linear-gradient(135deg, var(--red), #b5222a);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 10px;
        font-family: "Bebas Neue", sans-serif;
        font-size: 15px;
        letter-spacing: 3px;
        cursor: pointer;
        width: calc(100% - 28px);
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .detail-btn-full:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(212, 43, 47, 0.3);
      }

      /* ===== FULLSCREEN OVERLAY ===== */
      .fullscreen-overlay {
        position: fixed;
        inset: 0;
        background: var(--bg);
        z-index: 2000;
        display: flex;
        flex-direction: column;
        transform: translateX(100%);
        transition:
          transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
          background 0.3s;
      }

      .fullscreen-overlay.open {
        transform: translateX(0);
      }

      .fs-topbar {
        height: 56px;
        background: var(--topbar-bg);
        border-bottom: 1px solid var(--border);

        align-items: center;
        padding: 0 20px;
        gap: 16px;
        box-shadow: 0 1px 8px var(--shadow);
      }

        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 7px 14px;
        border-radius: 8px;
        cursor: pointer;
        font-family: "Bricolage Grotesque", sans-serif;
        font-size: 13px;
        transition: all 0.15s;
      }

      .fs-back-btn:hover {
        background: var(--yellow-light);
        border-color: var(--border-accent);
      }

      .fs-title-bar {
        flex: 1;
      }

      .fs-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 20px;
        color: var(--yellow);
        letter-spacing: 3px;
      }

      .fs-subtitle {
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 1px;
      }

      .fs-body {
        flex: 1;
        overflow-y: auto;
        padding: 28px 36px;
        max-width: 900px;
        margin: 0 auto;
        width: 100%;
      }

      .fs-body::-webkit-scrollbar {
        width: 4px;
      }
      .fs-body::-webkit-scrollbar-thumb {
        background: var(--border-accent);
        border-radius: 4px;
      }

      .fs-hero {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
        margin-bottom: 28px;
      }

      .fs-img-box {
        height: 220px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--surface);
      }

      .fs-img-box img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .fs-img-placeholder {
        text-align: center;
        color: var(--text-muted);
      }

      .fs-img-placeholder .big-icon {
        font-size: 40px;
        margin-bottom: 8px;
        opacity: 0.4;
      }
      .fs-img-placeholder p {
        font-size: 11px;
        opacity: 0.4;
        letter-spacing: 1px;
      }

      .fs-quick-facts {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .fs-fact-item {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 9px 12px;
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .fs-fact-icon {
        font-size: 16px;
        min-width: 24px;
        text-align: center;
        margin-top: 1px;
      }
      .fs-fact-label {
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .fs-fact-value {
        font-size: 12px;
        color: var(--text);
        font-weight: 600;
      }

      .fs-section {
        margin-bottom: 24px;
      }

      .fs-section-heading {
        font-family: "Bebas Neue", sans-serif;
        font-size: 18px;
        letter-spacing: 4px;
        color: var(--yellow);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .fs-section-heading::before {
        content: "";
        width: 4px;
        height: 18px;
        background: linear-gradient(180deg, var(--yellow), var(--red));
        border-radius: 2px;
      }

      .fs-section-text {
        font-size: 14px;
        line-height: 1.85;
        color: var(--text-muted);
      }

      .fs-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .fs-tag {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        padding: 4px 12px;
        border-radius: 20px;
        letter-spacing: 0.5px;
      }

        background: var(--yellow-light);
        color: var(--yellow);
        border: 1px solid var(--border-accent);

        background: rgba(212, 43, 47, 0.08);
        color: var(--red);
        border: 1px solid rgba(212, 43, 47, 0.2);
      }

      .fs-divider {
        height: 1px;
        background: var(--border);
        margin: 18px 0;
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        padding: 30px;
        text-align: center;
        gap: 10px;
        opacity: 0.4;
      }

        font-size: 36px;
      }
      .empty-state p {
        font-size: 12px;
        letter-spacing: 0.5px;
        line-height: 1.6;
      }

      /* Marker */
      @keyframes marker-pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
        100% {
          transform: scale(1);
        }
      }

      .custom-marker {
        width: 28px;
        height: 28px;
        background: var(--marker-bg);
        border: 2px solid var(--yellow);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 2px 10px var(--shadow);
      }

      .custom-marker.active {
        border-color: var(--red);
        box-shadow: 0 0 14px rgba(212, 43, 47, 0.5);
        animation: marker-pulse 1s ease-in-out infinite;
      }

      /* ===== MOBILE OVERLAY ===== */
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        top: 52px;
        background: rgba(0, 0, 0, 0.4);
        z-index: 799;
        backdrop-filter: blur(2px);
      }

      .sidebar-overlay.active {
        display: block;
      }

      /* ===== MOBILE BOTTOM SHEET ===== */
      .mobile-fab {
        display: none;
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 700;
        width: 48px;
        height: 48px;
        background: var(--red);
        border-radius: 50%;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        color: white;
        box-shadow: 0 4px 16px rgba(212, 43, 47, 0.4);
        cursor: pointer;
        border: none;
        transition: transform 0.2s;
      }

      .mobile-fab:hover {
        transform: scale(1.05);
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 768px) {
        :root {
          --sidebar-w: 280px;
          --detail-w: 100%;
        }

        .topbar-tag {
          display: none;
        }
        .topbar-sep {
          display: none;
        }
        .province-count-badge {
          display: none;
        }

        .mobile-menu-btn {
          display: flex;
        }

        .sidebar-left {
          transform: translateX(-100%);
          z-index: 850;
          width: 280px;
          box-shadow: 4px 0 24px var(--shadow-strong);
        }

        .sidebar-left.mobile-open {
          transform: translateX(0);
        }

        #map {
          left: 0 !important;
          right: 0 !important;
        }

        #map.detail-open {
          right: 0 !important;
        }

        .detail-panel {
          width: 100%;
          top: 52px;
          z-index: 820;
        }

        .mobile-fab {
          display: flex;
        }

        .fs-body {
          padding: 20px 16px;
        }

        .fs-hero {
          grid-template-columns: 1fr;
        }

        .fs-topbar {
          padding: 0 14px;
          gap: 10px;
        }

        .fs-back-btn {
          padding: 6px 10px;
          font-size: 12px;
        }
      }

      @media (max-width: 480px) {
        .topbar {
          padding: 0 12px;
          gap: 8px;
        }

        .topbar-logo {
          font-size: 17px;
          letter-spacing: 2px;

        .detail-prov-name {

        }

        }

          margin: 10px 12px 0;

        }
        .detail-scroll {
          padding: 10px 12px 8px;
        }
        .detail-btn-full {
          margin: 10px 12px 12px;
          width: calc(100% - 24px);
        }

        .fs-body {
          padding: 16px 14px;
        }
        .fs-title {
          font-size: 17px;
        }
      }

      // ============================
      // THEME MANAGEMENT
      // ============================
      let isDark = false;

      function initTheme() {
        const saved = localStorage.getItem("sukuTheme");
        if (saved === "dark") {
          setDark(true, false);
        }
      }

      function setDark(dark, save = true) {
        isDark = dark;
        document.documentElement.setAttribute(
          "data-theme",
          dark ? "dark" : "light",
        );
        document.getElementById("toggleIcon").textContent = dark ? "☀️" : "🌙";
        document.getElementById("toggleLabel").textContent = dark
          ? "LIGHT"
          : "DARK";
        if (save) localStorage.setItem("sukuTheme", dark ? "dark" : "light");

        // Update map tiles if map exists
        if (window._mapInstance && window._mapLayer) {
          window._mapInstance.removeLayer(window._mapLayer);
          window._mapLayer = L.tileLayer(
            dark
              ? "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
              : "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
            { maxZoom: 18, minZoom: 3 },
          ).addTo(window._mapInstance);
        }
      }

      document.getElementById("themeToggle").addEventListener("click", () => {
        setDark(!isDark);
      });

      // ============================
      // INIT
      // ============================
      let activeProvId = null;
      let markerMap = {};

      window.addEventListener("DOMContentLoaded", () => {
        initTheme();

        setTimeout(() => {
          const ls = document.getElementById("loading-screen");
          ls.style.transition = "opacity 0.5s ease, transform 0.5s ease";
          ls.style.opacity = "0";
          ls.style.transform = "scale(1.03)";
          setTimeout(() => {
            ls.style.display = "none";
            const app = document.getElementById("app");
            app.classList.add("visible");
            initMap();
            renderProvinceList();
          }, 500);
        }, 2500);
      });

      // ============================
      // MAP
      // ============================
      function initMap() {
        const map = L.map("map", {
          center: [-2.5, 118],
          zoom: 5,
          zoomControl: false,
          attributionControl: false,
        });

        const tileUrl = isDark
          ? "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
          : "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png";

        window._mapLayer = L.tileLayer(tileUrl, {
          maxZoom: 18,
          minZoom: 3,
        }).addTo(map);
        L.control.zoom({ position: "bottomright" }).addTo(map);

        provinsiData.forEach((prov) => {
          const icon = L.divIcon({
            className: "",
            html: `<div class="custom-marker" id="mkr-${prov.id}" title="${prov.nama}">●</div>`,
            iconSize: [28, 28],
            iconAnchor: [14, 14],
          });

          const marker = L.marker([prov.lat, prov.lng], { icon }).addTo(map);

          marker.bindPopup(
            `
            <div class="popup-inner">
                <div class="popup-title">${prov.nama}</div>
                <div class="popup-sub">🏛️ ${prov.ibukota} &nbsp;|&nbsp; ${prov.pulau}</div>
                <div class="popup-pop">👥 ${parseInt(prov.populasi.replace(/\./g, "")).toLocaleString("id-ID")} jiwa</div>
                <button class="popup-btn" onclick="selectProvince(${prov.id})">LIHAT DETAIL →</button>
            </div>
        `,
            { maxWidth: 200 },
          );

          markerMap[prov.id] = { marker, map };
        });

        window._mapInstance = map;
      }

      // ============================
      // MOBILE SIDEBAR
      // ============================
      function isMobile() {
        return window.innerWidth <= 768;
      }

      function openSidebar() {
        document.getElementById("sidebarLeft").classList.add("mobile-open");
        document.getElementById("sidebarOverlay").classList.add("active");
      }

      function closeSidebar() {
        document.getElementById("sidebarLeft").classList.remove("mobile-open");
        document.getElementById("sidebarOverlay").classList.remove("active");
      }

      document
        .getElementById("mobileMenuBtn")
        .addEventListener("click", openSidebar);
      document
        .getElementById("mobileFab")
        .addEventListener("click", openSidebar);
      document
        .getElementById("sidebarOverlay")
        .addEventListener("click", closeSidebar);

      // ============================
      // PROVINCE LIST
      // ============================
      function renderProvinceList(filter = "") {
        const list = document.getElementById("provinceList");
        const filtered = provinsiData.filter(
          (p) =>
            p.nama.toLowerCase().includes(filter.toLowerCase()) ||
            p.pulau.toLowerCase().includes(filter.toLowerCase()),
        );

        document.getElementById("countLabel").textContent =
          `${filtered.length} PROVINSI`;

        if (filtered.length === 0) {
          list.innerHTML = `<div class="empty-state"><div class="big">🔍</div><p>Provinsi tidak ditemukan</p></div>`;
          return;
        }

        list.innerHTML = filtered
          .map(
            (p) => `
        <div class="province-item ${activeProvId === p.id ? "active" : ""}" onclick="selectProvince(${p.id})" data-id="${p.id}">
            <span class="p-num">${String(p.id).padStart(2, "0")}</span>
            <span class="p-name">${p.nama}</span>
            <span class="p-island">${p.pulau.split(" ")[0]}</span>
            <span class="p-dot"></span>
        </div>
    `,
          )
          .join("");
      }

      document.getElementById("searchInput").addEventListener("input", (e) => {
        renderProvinceList(e.target.value);
      });

      // ============================
      // SELECT PROVINCE
      // ============================
      window.selectProvince = function (id) {
        const prov = provinsiData.find((p) => p.id === id);
        if (!prov) return;

        activeProvId = id;
        renderProvinceList(document.getElementById("searchInput").value);

        if (window._mapInstance) {
          window._mapInstance.flyTo([prov.lat, prov.lng], 7, { duration: 1.2 });
        }

        Object.keys(markerMap).forEach((mid) => {
          const el = document.getElementById(`mkr-${mid}`);
          if (el) el.classList.toggle("active", parseInt(mid) === id);
        });

        openDetailPanel(prov);

        // On mobile: close sidebar when selecting
        if (isMobile()) closeSidebar();

        setTimeout(() => {
          const el = document.querySelector(`.province-item[data-id="${id}"]`);
          if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }, 100);
      };
