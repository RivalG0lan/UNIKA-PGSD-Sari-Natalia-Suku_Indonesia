<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suku Indonesia — Peta Interaktif</title>
    <link rel="icon" type="image/png" href="assets/img/Logo_UNIKA.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --yellow: #FFF112;
            --red: #EC3237;
            --dark: #0d0d0d;
            --dark2: #1a1a1a;
            --dark3: #252525;
            --text: #f5f5f0;
            --text-muted: #888;
            --sidebar-w: 300px;
            --detail-w: 380px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Bricolage Grotesque', sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        /* ===== LOADING SCREEN ===== */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: var(--dark);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
        }

        .loader-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .loader-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(48px, 8vw, 96px);
            color: var(--yellow);
            letter-spacing: 6px;
            line-height: 1;
            animation: pulse-text 1.5s ease-in-out infinite;
        }

        .loader-subtitle {
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 1; text-shadow: 0 0 40px rgba(255,241,18,0.5); }
            50% { opacity: 0.7; text-shadow: 0 0 80px rgba(255,241,18,0.8); }
        }

        .loader-bar-wrap {
            width: 280px;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 99px;
            overflow: hidden;
        }

        .loader-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--yellow), var(--red));
            border-radius: 99px;
            animation: load-progress 2.2s cubic-bezier(0.4,0,0.2,1) forwards;
        }

        @keyframes load-progress {
            0% { width: 0%; }
            60% { width: 75%; }
            90% { width: 92%; }
            100% { width: 100%; }
        }

        .loader-dots {
            display: flex;
            gap: 8px;
        }

        .loader-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--red);
            animation: dot-bounce 1.2s ease-in-out infinite;
        }

        .loader-dots span:nth-child(2) { animation-delay: 0.2s; background: var(--yellow); }
        .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dot-bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ===== MAIN LAYOUT ===== */
        #app {
            display: flex;
            height: 100vh;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        #app.visible { opacity: 1; }

        /* ===== TOP BAR ===== */
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 52px;
            background: rgba(13,13,13,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,241,18,0.15);
            z-index: 900;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
        }

        .topbar-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            color: var(--yellow);
            letter-spacing: 3px;
        }

        .topbar-sep {
            width: 1px;
            height: 20px;
            background: rgba(255,255,255,0.15);
        }

        .topbar-tag {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .province-count-badge {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            background: rgba(255,241,18,0.12);
            color: var(--yellow);
            border: 1px solid rgba(255,241,18,0.3);
            padding: 4px 10px;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        /* ===== LEFT SIDEBAR ===== */
        .sidebar-left {
            position: fixed;
            top: 52px;
            left: 0;
            bottom: 0;
            width: var(--sidebar-w);
            background: rgba(18,18,18,0.97);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            z-index: 800;
        }

        .sidebar-head {
            padding: 20px 16px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .sidebar-head h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 3px;
            color: var(--yellow);
            margin-bottom: 12px;
        }

        .search-wrap {
            position: relative;
        }

        .search-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 13px;
            padding: 9px 14px 9px 36px;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        .search-input:focus {
            border-color: rgba(255,241,18,0.4);
            background: rgba(255,241,18,0.04);
        }

        .search-input::placeholder { color: var(--text-muted); }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 13px;
            pointer-events: none;
        }

        .province-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 8px;
        }

        .province-list::-webkit-scrollbar { width: 3px; }
        .province-list::-webkit-scrollbar-track { background: transparent; }
        .province-list::-webkit-scrollbar-thumb { background: rgba(255,241,18,0.3); border-radius: 3px; }

        .province-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            margin-bottom: 2px;
            border: 1px solid transparent;
        }

        .province-item:hover {
            background: rgba(255,241,18,0.06);
            border-color: rgba(255,241,18,0.12);
        }

        .province-item.active {
            background: rgba(255,241,18,0.1);
            border-color: rgba(255,241,18,0.3);
        }

        .province-item.active .p-name { color: var(--yellow); }

        .p-num {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            min-width: 22px;
        }

        .p-name {
            font-size: 13px;
            font-weight: 500;
            flex: 1;
        }

        .p-island {
            font-size: 10px;
            color: var(--text-muted);
            padding: 2px 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }

        .p-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--red);
            opacity: 0.5;
            transition: opacity 0.2s, background 0.2s;
        }

        .province-item.active .p-dot,
        .province-item:hover .p-dot {
            opacity: 1;
            background: var(--yellow);
        }

        .sidebar-footer-info {
            padding: 10px 16px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        /* ===== MAP ===== */
        #map {
            position: fixed;
            top: 52px;
            left: var(--sidebar-w);
            right: 0;
            bottom: 0;
            z-index: 100;
            transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
        }

        #map.detail-open {
            right: var(--detail-w);
        }

        /* Custom Leaflet popup */
        .leaflet-popup-content-wrapper {
            background: rgba(18,18,18,0.97) !important;
            backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255,241,18,0.25) !important;
            border-radius: 12px !important;
            color: var(--text) !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
        }

        .leaflet-popup-tip { background: rgba(18,18,18,0.97) !important; }

        .leaflet-popup-close-button {
            color: var(--text-muted) !important;
            font-size: 18px !important;
            top: 6px !important; right: 8px !important;
        }

        .popup-inner { padding: 4px 2px; }
        .popup-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            color: var(--yellow);
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .popup-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .popup-pop {
            font-size: 12px;
            color: var(--text);
            margin-bottom: 10px;
        }
        .popup-btn {
            background: linear-gradient(135deg, var(--yellow), #e8d800);
            color: var(--dark);
            border: none;
            padding: 7px 16px;
            border-radius: 6px;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            letter-spacing: 0.5px;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .popup-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255,241,18,0.3);
        }

        /* ===== RIGHT DETAIL PANEL ===== */
        .detail-panel {
            position: fixed;
            top: 52px;
            right: 0;
            bottom: 0;
            width: var(--detail-w);
            background: rgba(16,16,16,0.98);
            backdrop-filter: blur(12px);
            border-left: 1px solid rgba(255,241,18,0.15);
            z-index: 800;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
        }

        .detail-panel.open {
            transform: translateX(0);
        }

        .detail-header {
            padding: 20px 18px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: linear-gradient(180deg, rgba(255,241,18,0.06) 0%, transparent 100%);
            position: relative;
        }

        .detail-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 28px;
            height: 28px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.15s;
        }

        .detail-close:hover {
            background: rgba(236,50,55,0.2);
            border-color: rgba(236,50,55,0.4);
            color: var(--red);
        }

        .detail-island-tag {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--red);
            margin-bottom: 6px;
        }

        .detail-prov-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 30px;
            color: var(--yellow);
            letter-spacing: 3px;
            line-height: 1;
            margin-bottom: 4px;
        }

        .detail-capital {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .detail-stats {
            display: flex;
            gap: 8px;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .stat-box {
            flex: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 10px 10px;
            text-align: center;
        }

        .stat-val {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--yellow);
            font-weight: 500;
            margin-bottom: 3px;
        }

        .stat-lbl {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* Image box */
        .detail-img-box {
            margin: 14px 18px 0;
            height: 160px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .detail-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-img-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
        }

        .detail-img-placeholder .icon {
            font-size: 36px;
            opacity: 0.3;
        }

        .detail-img-placeholder p {
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.4;
        }

        .img-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            border-radius: 4px;
            padding: 3px 8px;
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.5px;
        }

        /* Suku description */
        .detail-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 14px 18px 10px;
        }

        .detail-scroll::-webkit-scrollbar { width: 3px; }
        .detail-scroll::-webkit-scrollbar-thumb { background: rgba(255,241,18,0.2); border-radius: 3px; }

        .suku-section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            letter-spacing: 3px;
            color: var(--red);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .suku-section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(236,50,55,0.25);
        }

        .suku-desc-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-left: 3px solid var(--red);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 12.5px;
            line-height: 1.75;
            color: rgba(255,255,255,0.75);
        }

        .suku-name-tag {
            display: inline-block;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            background: rgba(236,50,55,0.15);
            color: var(--red);
            border: 1px solid rgba(236,50,55,0.3);
            padding: 2px 8px;
            border-radius: 4px;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .detail-btn-full {
            margin: 14px 18px 18px;
            background: linear-gradient(135deg, var(--red), #c0272b);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 3px;
            cursor: pointer;
            width: calc(100% - 36px);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .detail-btn-full:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(236,50,55,0.35);
        }

        /* ===== FULLSCREEN OVERLAY ===== */
        .fullscreen-overlay {
            position: fixed;
            inset: 0;
            background: var(--dark);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
        }

        .fullscreen-overlay.open {
            transform: translateX(0);
        }

        .fs-topbar {
            height: 58px;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255,241,18,0.15);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
        }

        .fs-back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            padding: 7px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 13px;
            transition: all 0.15s;
        }

        .fs-back-btn:hover {
            background: rgba(255,241,18,0.08);
            border-color: rgba(255,241,18,0.2);
        }

        .fs-title-bar {
            flex: 1;
        }

        .fs-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            color: var(--yellow);
            letter-spacing: 3px;
        }

        .fs-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .fs-body {
            flex: 1;
            overflow-y: auto;
            padding: 32px 40px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .fs-body::-webkit-scrollbar { width: 4px; }
        .fs-body::-webkit-scrollbar-thumb { background: rgba(255,241,18,0.2); border-radius: 4px; }

        .fs-hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }

        .fs-img-box {
            height: 240px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fs-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .fs-img-placeholder {
            text-align: center;
            color: var(--text-muted);
        }

        .fs-img-placeholder .big-icon { font-size: 48px; margin-bottom: 8px; }
        .fs-img-placeholder p { font-size: 11px; opacity: 0.4; letter-spacing: 1px; }

        .fs-quick-facts {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .fs-fact-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .fs-fact-icon {
            font-size: 18px;
            min-width: 26px;
            text-align: center;
            margin-top: 1px;
        }

        .fs-fact-body {}
        .fs-fact-label {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .fs-fact-value {
            font-size: 13px;
            color: var(--text);
            font-weight: 600;
        }

        .fs-section {
            margin-bottom: 28px;
        }

        .fs-section-heading {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 4px;
            color: var(--yellow);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .fs-section-heading::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--yellow), var(--red));
            border-radius: 2px;
        }

        .fs-section-text {
            font-size: 14px;
            line-height: 1.85;
            color: rgba(255,255,255,0.7);
        }

        .fs-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .fs-tag {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .fs-tag.yellow {
            background: rgba(255,241,18,0.1);
            color: var(--yellow);
            border: 1px solid rgba(255,241,18,0.25);
        }

        .fs-tag.red {
            background: rgba(236,50,55,0.1);
            color: var(--red);
            border: 1px solid rgba(236,50,55,0.25);
        }

        .fs-divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 20px 0;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 30px;
            text-align: center;
            gap: 10px;
            opacity: 0.5;
        }

        .empty-state .big { font-size: 40px; }
        .empty-state p { font-size: 12px; letter-spacing: 0.5px; line-height: 1.6; }

        /* Marker animation */
        @keyframes marker-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* ===== LEAFLET CUSTOM MARKER ===== */
        .custom-marker {
            width: 28px;
            height: 28px;
            background: var(--dark);
            border: 2px solid var(--yellow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;

// ============================
// INIT
// ============================
let activeProvId = null;
let markerMap = {};

window.addEventListener('DOMContentLoaded', () => {
    // Loading animation then show app
    setTimeout(() => {
        const ls = document.getElementById('loading-screen');
        ls.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        ls.style.opacity = '0';
        ls.style.transform = 'scale(1.04)';
        setTimeout(() => {
            ls.style.display = 'none';
            const app = document.getElementById('app');
            app.classList.add('visible');
            initMap();
            renderProvinceList();
        }, 500);
    }, 2500);
});

// ============================
// MAP
// ============================
function initMap() {
    const map = L.map('map', {
        center: [-2.5, 118],
        zoom: 5,
        zoomControl: false,
        attributionControl: false
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 18, minZoom: 3
    }).addTo(map);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    provinsiData.forEach(prov => {
        const icon = L.divIcon({
            className: '',
            html: `<div class="custom-marker" id="mkr-${prov.id}" title="${prov.nama}">●</div>`,
            iconSize: [28, 28],
            iconAnchor: [14, 14]
        });

        const marker = L.marker([prov.lat, prov.lng], { icon }).addTo(map);

        marker.bindPopup(`
            <div class="popup-inner">
                <div class="popup-title">${prov.nama}</div>
                <div class="popup-sub">🏛️ ${prov.ibukota} &nbsp;|&nbsp; ${prov.pulau}</div>
                <div class="popup-pop">👥 ${parseInt(prov.populasi.replace(/\./g,'')).toLocaleString('id-ID')} jiwa</div>
                <button class="popup-btn" onclick="selectProvince(${prov.id})">LIHAT DETAIL →</button>
            </div>
        `, { maxWidth: 200 });

        marker.on('click', () => {});
        markerMap[prov.id] = { marker, map };
    });

    window._mapInstance = map;
}

// ============================
// PROVINCE LIST
// ============================
function renderProvinceList(filter = '') {
    const list = document.getElementById('provinceList');
    const filtered = provinsiData.filter(p =>
        p.nama.toLowerCase().includes(filter.toLowerCase()) ||
        p.pulau.toLowerCase().includes(filter.toLowerCase())
    );

    document.getElementById('countLabel').textContent = `${filtered.length} PROVINSI`;

    if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="big">🔍</div><p>Provinsi tidak ditemukan</p></div>`;
        return;
    }

    list.innerHTML = filtered.map(p => `
        <div class="province-item ${activeProvId === p.id ? 'active' : ''}" onclick="selectProvince(${p.id})" data-id="${p.id}">
            <span class="p-num">${String(p.id).padStart(2,'0')}</span>
            <span class="p-name">${p.nama}</span>
            <span class="p-island">${p.pulau.split(' ')[0]}</span>
            <span class="p-dot"></span>
        </div>
    `).join('');
}

document.getElementById('searchInput').addEventListener('input', e => {
    renderProvinceList(e.target.value);
});

// ============================
// SELECT PROVINCE
// ============================
window.selectProvince = function(id) {
    const prov = provinsiData.find(p => p.id === id);
    if (!prov) return;

    activeProvId = id;
    renderProvinceList(document.getElementById('searchInput').value);

    // Fly map
    if (window._mapInstance) {
        window._mapInstance.flyTo([prov.lat, prov.lng], 7, { duration: 1.2 });
    }

    // Highlight marker
    Object.keys(markerMap).forEach(mid => {
        const el = document.getElementById(`mkr-${mid}`);
        if (el) el.classList.toggle('active', parseInt(mid) === id);
    });

    // Open detail panel
    openDetailPanel(prov);

    // Scroll list item into view
    setTimeout(() => {
        const el = document.querySelector(`.province-item[data-id="${id}"]`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
};

// ============================
// DETAIL PANEL
// ============================
function openDetailPanel(prov) {
    document.getElementById('detailIsland').textContent = `📍 ${prov.pulau}`;
    document.getElementById('detailProvName').textContent = prov.nama;
    document.getElementById('detailCapital').innerHTML = `🏛️ Ibu Kota: <strong style="color:var(--text)">${prov.ibukota}</strong>`;

    document.getElementById('detailStats').innerHTML = `
        <div class="stat-box">
            <div class="stat-val">${prov.luas}</div>
            <div class="stat-lbl">LUAS</div>
        </div>
        <div class="stat-box">
            <div class="stat-val">${parseInt(prov.populasi.replace(/\./g,'')).toLocaleString('id-ID')}</div>
            <div class="stat-lbl">POPULASI</div>
        </div>
        <div class="stat-box">
            <div class="stat-val" style="font-size:10px;line-height:1.3">${prov.gubernur}</div>
            <div class="stat-lbl">GUBERNUR</div>
        </div>
    `;

    // Image
    document.getElementById('detailImgBox').innerHTML = `
        <div class="detail-img-placeholder">
            <div class="icon">🏙️</div>
            <p>${prov.ibukota.toUpperCase()}</p>
        </div>
        <div class="img-label">📷 Foto Provinsi</div>
    `;

    document.getElementById('sukuNameTag').textContent = `SUKU ${prov.suku.toUpperCase()}`;
    document.getElementById('sukuDescText').textContent = prov.sukuDesc;

    document.getElementById('detailPanel').classList.add('open');
    document.getElementById('map').classList.add('detail-open');
}

document.getElementById('detailClose').addEventListener('click', () => {
    document.getElementById('detailPanel').classList.remove('open');
    document.getElementById('map').classList.remove('detail-open');
    activeProvId = null;
    renderProvinceList(document.getElementById('searchInput').value);
    Object.keys(markerMap).forEach(mid => {
        const el = document.getElementById(`mkr-${mid}`);
        if (el) el.classList.remove('active');
    });
});

// ============================
// FULLSCREEN OVERLAY
// ============================
document.getElementById('openFullscreenBtn').addEventListener('click', () => {
    const prov = provinsiData.find(p => p.id === activeProvId);
    if (!prov) return;
    openFullscreen(prov);
});

function openFullscreen(prov) {
    document.getElementById('fsTitle').textContent = prov.nama.toUpperCase();

    document.getElementById('fsBody').innerHTML = `

            <div class="fs-img-box">

                    </div>
                </div>
                <div class="fs-fact-item">

                    <div class="fs-fact-body">
                        <div class="fs-fact-label">POPULASI</div>

                    </div>
                </div>
                <div class="fs-fact-item">
                    <div class="fs-fact-icon">🏛️</div>
                    <div class="fs-fact-body">
                        <div class="fs-fact-label">GUBERNUR</div>
                        <div class="fs-fact-value">${prov.gubernur}</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="fs-divider"></div>

        <div class="fs-section">
            <div class="fs-section-heading">SUKU ${prov.suku.toUpperCase()}</div>
            <p class="fs-section-text">${prov.fullDesc}</p>
        </div>

        <div class="fs-section">
            <div class="fs-section-heading">SENI & BUDAYA</div>
            <p class="fs-section-text" style="margin-bottom:12px">Berikut adalah warisan seni dan budaya yang berasal dari suku ${prov.suku}:</p>
            <div class="fs-tags">${tagsHtml(prov.senibudaya, 'yellow')}</div>
        </div>

        <div class="fs-section">
            <div class="fs-section-heading">INFORMASI TAMBAHAN</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px;">
                <div class="fs-fact-item">
                    <div class="fs-fact-icon">🗣️</div>
                    <div class="fs-fact-body">
                        <div class="fs-fact-label">BAHASA</div>
                        <div class="fs-fact-value" style="font-size:12px">${prov.bahasa}</div>
                    </div>
                </div>
                <div class="fs-fact-item">
                    <div class="fs-fact-icon">🕌</div>

                    </div>
                </div>
                <div class="fs-fact-item" style="grid-column:1/-1">

    document.getElementById('fullscreenOverlay').classList.add('open');

document.getElementById('closeFullscreenBtn').addEventListener('click', () => {
    document.getElementById('fullscreenOverlay').classList.remove('open');
});
</script>
